name: Deploy API to WeChat Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - "src/server/**"
      - "src/db/**"
      - "Dockerfile"
      - "tsup.config.ts"
      - ".github/workflows/deploy-wxcloud.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      WXCLOUD_APPID: ${{ secrets.WXCLOUD_APPID }}
      WXCLOUD_CLI_SECRET: ${{ secrets.WXCLOUD_CLI_SECRET }}
      WXCLOUD_ENVID: ${{ secrets.WXCLOUD_ENVID }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm i -g @wxcloud/cli
      - name: Login
        run: wxcloud login --appId "$WXCLOUD_APPID" --privateKey "$WXCLOUD_CLI_SECRET"
      - name: Deploy to Cloud Run
        run: |
          wxcloud run:deploy . \
            --envId "$WXCLOUD_ENVID" \
            --serviceName cantabile-api \
            --containerPort 3000 \
            --region ap-shanghai \
            --releaseType FULL \
            --noConfirm \
            --override \
            --envParams "DATABASE_URL=$DATABASE_URL"
