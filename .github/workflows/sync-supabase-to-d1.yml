name: Sync Supabase to Cloudflare D1

on:
  workflow_dispatch:
    inputs:
      d1_database_name:
        description: Cloudflare D1 database name
        required: false
        default: cantabile
  schedule:
    - cron: "17 19 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_D1_DATABASE_NAME: ${{ inputs.d1_database_name || 'cantabile' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply "$CLOUDFLARE_D1_DATABASE_NAME" --remote

      - name: Sync Supabase rows to D1
        run: npm run sync:supabase-to-d1
